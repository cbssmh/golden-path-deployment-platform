apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-applications
  namespace: __ARGOCD_NAMESPACE__
  labels:
    app.kubernetes.io/name: root-applications
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: golden-path-platform
spec:
  project: default
  source:
    repoURL: __GITOPS_REPOSITORY_URL__
    targetRevision: __GITOPS_TARGET_REVISION__
    path: __GITOPS_ROOT_PATH__
  destination:
    server: https://kubernetes.default.svc
    namespace: __ARGOCD_NAMESPACE__
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
